version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: nutrivision_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nutrivision

  backend:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: nutrivision_backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/nutrivision
      JWT_SECRET: change_this_in_production
      JWT_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80,http://localhost:8001"
    volumes:
      - ./backend-api/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8001
    container_name: nutrivision_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
